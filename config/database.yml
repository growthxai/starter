default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  primary:
    <<: *default
    database: starter_development
  queue:
    <<: *default
    database: starter_development_queue
    migrations_paths: db/queue_migrate
  cache:
    <<: *default
    database: starter_development_cache
    migrations_paths: db/cache_migrate
  cable:
    <<: *default
    database: starter_development_cable
    migrations_paths: db/cable_migrate

test:
  primary:
    <<: *default
    database: starter_test
  queue:
    <<: *default
    database: starter_test_queue
    migrations_paths: db/queue_migrate
  cache:
    <<: *default
    database: starter_test_cache
    migrations_paths: db/cache_migrate
  cable:
    <<: *default
    database: starter_test_cable
    migrations_paths: db/cable_migrate

production:
  primary:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  queue:
    <<: *default
    url: <%= ENV["QUEUE_DATABASE_URL"] %>
    migrations_paths: db/queue_migrate
  cache:
    <<: *default
    url: <%= ENV["CACHE_DATABASE_URL"] %>
    migrations_paths: db/cache_migrate
  cable:
    <<: *default
    url: <%= ENV["CABLE_DATABASE_URL"] %>
    migrations_paths: db/cable_migrate
